<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeReader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const textContent = document.getElementById('textContent');
    const voiceSelect = document.getElementById('voiceSelect');
    const rateSlider = document.getElementById('rateSlider');
    const pitchSlider = document.getElementById('pitchSlider');
    const volumeSlider = document.getElementById('volumeSlider');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const pauseBtn = document.getElementById('pauseBtn');
    const visualizer = document.getElementById('visualizer');
    
    let synth = window.speechSynthesis;
    let voices = [];
    let isPaused = false;
    let isAudioUnlocked = false; // MOBİL KİLİT İÇİN

    // 1. MOBİL SES KİLİDİNİ AÇMA (Ekrana ilk dokunuşta motoru uyandırır)
    document.body.addEventListener('touchstart', function() {
        if (!isAudioUnlocked) {
            let unlockMsg = new SpeechSynthesisUtterance('');
            synth.speak(unlockMsg);
            isAudioUnlocked = true;
        }
    }, { once: true });
    
    document.body.addEventListener('click', function() {
        if (!isAudioUnlocked) {
            let unlockMsg = new SpeechSynthesisUtterance('');
            synth.speak(unlockMsg);
            isAudioUnlocked = true;
        }
    }, { once: true });

    function populateVoiceList() {
        voices = synth.getVoices();
        voiceSelect.innerHTML = '';
        
        const sortedVoices = voices.sort((a, b) => {
            const aQuality = a.name.includes('Neural') || a.name.includes('Google') || a.name.includes('Natural');
            const bQuality = b.name.includes('Neural') || b.name.includes('Google') || b.name.includes('Natural');
            return bQuality - aQuality;
        });

        const trVoices = sortedVoices.filter(v => v.lang.includes('tr'));
        const otherVoices = sortedVoices.filter(v => !v.lang.includes('tr'));
        const finalVoices = [...trVoices, ...otherVoices];

        finalVoices.forEach((voice) => {
            const option = document.createElement('option');
            option.textContent = `${voice.name.replace('Microsoft', '').replace('Google', 'AI')} (${voice.lang})`;
            option.value = voice.voiceURI;
            if(voice.lang.includes('tr')) option.style.color = "#60a5fa";
            voiceSelect.appendChild(option);
        });
    }

    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    rateSlider.oninput = () => document.getElementById('speedValue').textContent = rateSlider.value + 'x';
    pitchSlider.oninput = () => document.getElementById('pitchValue').textContent = pitchSlider.value;
    volumeSlider.oninput = () => document.getElementById('volumeValue').textContent = Math.round(volumeSlider.value * 100) + '%';

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        let displayName = file.name;
        if(displayName.length > 25) displayName = displayName.substring(0, 22) + "...";
        fileNameDisplay.textContent = displayName;
        textContent.value = "⏳ Belge analiz ediliyor...";

        try {
            if (file.type === "application/pdf") {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContentObj = await page.getTextContent();
                        fullText += textContentObj.items.map(s => s.str).join(' ') + "\n\n";
                    }
                    textContent.value = fullText.trim();
                };
                reader.readAsArrayBuffer(file);
            } else {
                const reader = new FileReader();
                reader.onload = function(event) {
                    mammoth.extractRawText({arrayBuffer: event.target.result})
                        .then(result => { textContent.value = result.value; });
                };
                reader.readAsArrayBuffer(file);
            }
        } catch (error) {
            textContent.value = "❌ Dosya okunurken bir hata oluştu.";
        }
    });

    function play() {
        if (synth.paused) {
            synth.resume();
            isPaused = false;
            pauseBtn.innerHTML = "⏸️ Duraklat";
            visualizer.style.opacity = "1";
            return;
        }

        // 2. MOBİL İÇİN GÜVENLİ DURDURMA (Hemen cancel yapıp speak yapmak mobilde buga sokabilir)
        synth.cancel();
        
        setTimeout(() => {
            const startPos = textContent.selectionStart || 0;
            const textToRead = textContent.value.substring(startPos);
            if (!textToRead.trim()) return;

            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.voice = voices.find(v => v.voiceURI === voiceSelect.value);
            utterance.rate = parseFloat(rateSlider.value);
            utterance.pitch = parseFloat(pitchSlider.value);
            utterance.volume = parseFloat(volumeSlider.value);

            utterance.onstart = () => visualizer.style.opacity = "1";
            utterance.onend = () => visualizer.style.opacity = "0";
            utterance.onerror = (e) => {
                console.error("Ses hatası:", e);
                visualizer.style.opacity = "0";
            };

            isPaused = false;
            pauseBtn.innerHTML = "⏸️ Duraklat";
            synth.speak(utterance);
        }, 50); // 50ms gecikme mobil tarayıcının rahatlamasını sağlar
    }

    function pauseResume() {
        if (synth.speaking && !synth.paused) {
            synth.pause();
            isPaused = true;
            pauseBtn.innerHTML = "▶️ Devam Et";
            visualizer.style.opacity = "0";
        } else if (synth.paused) {
            synth.resume();
            isPaused = false;
            pauseBtn.innerHTML = "⏸️ Duraklat";
            visualizer.style.opacity = "1";
        }
    }

    function stop() {
        synth.cancel();
        isPaused = false;
        pauseBtn.innerHTML = "⏸️ Duraklat";
        visualizer.style.opacity = "0";
    }
</script>
    </script>
</body>
</html>
